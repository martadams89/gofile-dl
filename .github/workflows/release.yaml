name: Release Please
on:
  # Run on every push to main. release-please maintains a release PR; when that
  # PR is merged (another push to main) it cuts the GitHub release + tags and
  # triggers the Docker publish. This closes the fully-automated loop:
  #   Renovate merges a dep PR -> push to main -> release PR opened/updated
  #   -> release PR auto-merged -> push to main -> release published.
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          release-type: simple
          # Reuse the Renovate PAT/App token: it has contents + pull-requests
          # write, and using it (instead of the default GITHUB_TOKEN) makes the
          # release PR's merge re-trigger this workflow so the release actually
          # gets cut. Falls back to GITHUB_TOKEN if the secret isn't set.
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge on the release PR
        if: ${{ steps.rp.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
          RP_PR: ${{ steps.rp.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          pr_number=$(echo "$RP_PR" | jq -r '.number')
          if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
            echo "Enabling auto-merge on release PR #$pr_number"
            gh pr merge "$pr_number" --auto --squash --repo "$REPO"
          fi

      - uses: actions/checkout@v6
        if: ${{ steps.rp.outputs.release_created }}
      - name: tag major and minor versions
        if: ${{ steps.rp.outputs.release_created }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git remote add gh-token "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.event.repository.name }}.git"
          git tag -d v${{ steps.rp.outputs.major }} || true
          git tag -d v${{ steps.rp.outputs.major }}.${{ steps.rp.outputs.minor }} || true
          git push origin :v${{ steps.rp.outputs.major }} || true
          git push origin :v${{ steps.rp.outputs.major }}.${{ steps.rp.outputs.minor }} || true
          git tag -a v${{ steps.rp.outputs.major }} -m "Release v${{ steps.rp.outputs.major }}"
          git tag -a v${{ steps.rp.outputs.major }}.${{ steps.rp.outputs.minor }} -m "Release v${{ steps.rp.outputs.major }}.${{ steps.rp.outputs.minor }}"
          git push origin v${{ steps.rp.outputs.major }}
          git push origin v${{ steps.rp.outputs.major }}.${{ steps.rp.outputs.minor }}

  publish-docker-image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ./.github/workflows/reusable_docker-build-and-push.yaml
    secrets: inherit # pass all secrets to the called workflow
    with:
      publish: true
      publish_dockerhub: false
      version: ${{ needs.release-please.outputs.tag }}
