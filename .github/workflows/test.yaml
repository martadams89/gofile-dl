name: Test
on:
  workflow_call:

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover -s tests

      # Checkov scans the Dockerfile source (framework: dockerfile), so no
      # docker build is needed here. The image itself is built and validated by
      # the reusable build-and-push workflow.
      - name: Scan Dockerfile vulnerabilities using Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: .
          framework: dockerfile
          quiet: true
          container_user: 1000
